name: 'Suricata 101'
type: suricata
divider_before: 'Suricata'

text: |-
  Let's learn how to detect an evil URL!

  This is placeholder and will be more

  To finish this level, block the bad request

hints:
- ".."
- "/../../../"

base_rule: |-
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.method; content:"GET"; http.uri; content:"/put/the/content/here"; sid:1030004; rev:1;)

evil_requests:
  - request: |-
      GET /backdoor.php HTTP/1.0
      Connection: close

innocent_requests:
  - request: |-
      GET /goodpage.php HTTP/1.0
      Connection: close
  - request: |-
      GET / HTTP/1.0
      Connection: close
