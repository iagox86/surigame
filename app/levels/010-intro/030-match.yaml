name: 'Intro: Suricata'
type: 'demo'

text: |-
  Match a simple URL: `backdoor.php`

base_rule: |-
  alert http any any -> any any ( \
    msg:"demo"; \
    http.uri; content: "backdoor.php"; \
    sid:1031340; \
    rev:1; \
  )

base_request: |-
  GET /backdoor.php?arg1=val1&cmd=whoami HTTP/1.1
  Cookie: abc=123
  Host: example.org
