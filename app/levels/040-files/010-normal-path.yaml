name: 'Normal paths'
type: 'demo'
divider_before: 'file paths'

text: |-
  Matching a standard path

base_rule: |-
  alert http any any -> any any ( \
    msg:"demo"; \
    http.uri; content: "/folder/file"; \
    sid:123456; \
    rev:1; \
  )

base_request: |-
  GET /folder/file HTTP/1.1
  Host: example.org
