name: 'Default login 4'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Log in as admin:admin**

hints: []

target: extinction

base_request: |-
  GET /avert-disaster.php HTTP/1.1
  Host: localhost
  Authorization: basic YWRtaW46YWRtaW4=

rules:
# base64_decode, but relative to a single space
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.header; content: "Authorization: basic "; base64_decode: bytes 16, offset 0, relative; base64_data; content: "admin:admin"; sid:123456; rev:1;)

expected_output: "Congratulations!"
