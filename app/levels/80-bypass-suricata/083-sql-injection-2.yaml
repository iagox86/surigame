name: 'SQL Injection (Search) 3'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Fetch all records**

hints: []

target: taxonomy

base_request: |-
  GET /?search=nebula')%20or%20'1'='1'-- HTTP/1.1
  Host: localhost

rules:
# Avoid space
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri; url_decode; content: "search="; content: " "; sid:123456; rev:1;)

expected_output: "Flaggy flag"
