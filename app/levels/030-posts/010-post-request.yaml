name: 'POST request decoding'
type: 'demo'
divider_before: 'POST requests'

text: |-
  POST request with no special encoding are matched using `http.request_body`

base_rule: |-
  alert http any any -> any any ( \
    msg:"demo"; \
    http.request_body; content: "1.2.3.4"; \
    sid:123456; \
    rev:1; \
  )

base_request: |-
  POST /detection.php HTTP/1.1
  Host: example.org
  Content-Length: 10
  Content-Type: application/x-www-form-urlencoded
  
  ip=1.2.3.4
