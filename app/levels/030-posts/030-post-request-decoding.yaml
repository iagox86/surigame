name: 'POST request decoding'
type: 'suricata'

text: |-
  POST request with an encoded body isn't matched by default!

  * Goal: Add `url_decode`!

base_rule: |-
  alert http any any -> any any ( \
    msg:"demo"; \
    http.request_body; content: "cmd="; \
    sid:123456; \
    rev:1; \
  )

solution: |-
  alert http any any -> any any ( \
    msg:"demo"; \
    http.request_body; url_decode; content: "cmd="; \
    sid:123456; \
    rev:1; \
  )

evil_requests:
  - |-
    POST /detection.php HTTP/1.1
    Host: example.org
    Content-Length: 24
    Content-Type: application/x-www-form-urlencoded
    
    %63%6d%64=%77%68%6f%61%6d%69
