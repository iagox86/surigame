name: 'POST request decoding'
type: 'demo'
divider_before: 'POST requests'

text: |-
  POST request with an encoded body isn't matched by default!

  * Goal: Add `url_decode`!

base_rule: |-
  alert http any any -> any any ( \
    msg:"demo"; \
    http.request_body; content: "1.2.3.4"; \
    sid:123456; \
    rev:1; \
  )

base_request: |-
  POST /detection.php HTTP/1.1
  Host: example.org
  Content-Length: 24
  Content-Type: application/x-www-form-urlencoded
  
  ip=%31%2e%32%2e%33%2e%34
