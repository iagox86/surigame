type: 'demo'

text: |-
  Handling \u encoding in JSON is..... basically impossible...

base_rule: |-
  alert http any any -> any any ( \
    msg:"demo"; \
    http.uri; content: "/cgi-bin/cstecgi.cgi"; \
    http.request_body; \
      content: "\"command\""; \
      content: "\"topicurl\""; content: "\"setTracerouteCfg\""; \
      pcre: "/\"topicurl\".*:.*\"setTracerouteCfg\"/s"; \
    sid:123456; \
    rev:1; \
  )

