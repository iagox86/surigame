name: 'Path Traversal (Param) 6'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Fetch /var/www/html/picture.php**

hints: []

target: sighting

base_request: |-
  GET /picture.php?file=../../../../../../../var/www/html/picture.php HTTP/1.1
  Host: localhost

rules:
# Case
  - >
    alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.method; content: "GET"; http.uri; content: "/picture.php"; pcre:"/file=.*(\.|%2e)(\.|%2e)(\/|%2f)/"; sid:123456; rev:1;)
  - >
    alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.method; content: "GET"; http.uri; content: "/picture.php"; http.request_body; pcre:"/file=.*(\.|%2e)(\.|%2e)(\/|%2f)/"; sid:123457; rev:1;)

expected_output: "mime_content_type"
