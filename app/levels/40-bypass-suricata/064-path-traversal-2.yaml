name: 'Path Traversal (Param)'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Fetch /var/www/html/picture.php**

hints: []

target:
  dev:
    host: localhost
    port: 10004
  prod:
    host: detector
    port: 80

base_request: |-
  GET /picture.php?file=../../../../../../../var/www/html/picture.php HTTP/1.1
  Host: localhost

rules:
# Newline injection maybe?
  - >
    alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.method; content: "GET"; http.uri; content: "/picture.php"; pcre:"/filename=.*(.|%2e)(.|%2e)(/|%2f)/i\""; sid:123456; rev:1;)
  - >
    alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.method; content: "GET"; http.uri; content: "/picture.php"; http.uri; pcre:"/.*(.|%2e)(.|%2e)(/|%2f)/i\""; sid:123456; rev:1;)

expected_output: "mime_content_type"
