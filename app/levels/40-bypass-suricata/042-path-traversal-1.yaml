name: 'Path Traversal (URI)'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  (The point of this level is to show how hard it is to use `http.uri.raw` safely :)

  **Goal: Print (`cat`) `/app/server.rb`**

hints: []

target:
  dev:
    host: localhost
    port: 10002
  prod:
    host: detector
    port: 80

base_request: |-
  GET /../../../../../../../app/server.rb HTTP/1.1
  Host: localhost

rules:
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri.raw; pcre: "/(.|%2e)(/|%2f)(.|%2e)/i"; sid:123456; rev:1;)

expected_output: "TCPServer.new"
