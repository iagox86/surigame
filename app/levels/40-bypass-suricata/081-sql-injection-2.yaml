name: 'SQL Injection (Search)'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Fetch all records**

hints: []

target:
  dev:
    host: localhost
    port: 10006
  prod:
    host: detector
    port: 80

base_request: |-
  GET /?search=nebula')+or+'1'='1'-- HTTP/1.1
  Host: localhost

rules:
# avoid )
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri; content: "search="; content: ")"; sid:123456; rev:1;)

expected_output: "Flaggy flag"
