name: 'Default login 1'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Log in as admin:admin**

hints: []

target:
  dev:
    host: localhost
    port: 10003
  prod:
    host: detector
    port: 80

base_request: |-
  GET /avert-disaster.php HTTP/1.1
  Host: localhost
  Authorization: basic YWRtaW46YWRtaW4

rules:
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.header.raw; content: "Authorization: basic YWRtaW46YWRtaW4"; sid:123456; rev:1;)

expected_output: "Congratulations!"
