name: 'XXE'
type: suricata

text: |-
  Can you match this XML payload? Try not to match literally `&xxe`, but find a
  way to match the actual vulnerability!

base_rule: |-
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; sid:123456; rev:1;)

solution: |-
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.request_body; content: "<!ENTITY"; content: "SYSTEM"; sid:123456; rev:1;)

evil_requests:
  - |-
    POST / HTTP/1.1
    Host: localhost
    Connection: keep-alive
    Content-Length: 376
    Content-Type: multipart/form-data; boundary=----WebKitFormBoundarybBYvkB2ohiOQdWxB

    ------WebKitFormBoundarybBYvkB2ohiOQdWxB
    Content-Disposition: form-data; name="dragon_file"; filename="dragons.xml"
    Content-Type: text/xml

    <?xml version="1.0" encoding="UTF-8"?>
    <!DOCTYPE root [
      <!ENTITY xxe SYSTEM "file:///etc/passwd">
    ]>
    <dragons>
      <dragon>
        <name>Smaug</name>
        <proof>&xxe;</proof>
      </dragon>
    </dragons>

    ------WebKitFormBoundarybBYvkB2ohiOQdWxB--

innocent_requests:
  - |-
    GET / HTTP/1.1
    Host: localhost

  - |-
    POST / HTTP/1.1
    Host: localhost
    Connection: keep-alive
    Content-Length: 475
    Content-Type: multipart/form-data; boundary=----WebKitFormBoundarybBYvkB2ohiOQdWxB

    ------WebKitFormBoundarybBYvkB2ohiOQdWxB
    Content-Disposition: form-data; name="dragon_file"; filename="dragons.xml"
    Content-Type: text/xml

    <?xml version="1.0" encoding="UTF-8"?>
    <dragons>
      <dragon>
        <name>Smaug</name>
        <proof>Photograph</proof>
      </dragon>
      <dragon>
        <name>Saphira</name>
        <proof>Footprints</proof>
      </dragon>
      <dragon>
        <name>Toothless</name>
        <proof>Sighting</proof>
      </dragon>
    </dragons>

    ------WebKitFormBoundarybBYvkB2ohiOQdWxB--

  - |-
    POST / HTTP/1.1
    Host: localhost
    Connection: keep-alive
    Content-Length: 314
    Content-Type: multipart/form-data; boundary=----WebKitFormBoundarybBYvkB2ohiOQdWxB

    ------WebKitFormBoundarybBYvkB2ohiOQdWxB
    Content-Disposition: form-data; name="dragon_file"; filename="dragons.xml"
    Content-Type: text/xml

    <?xml version="1.0" encoding="UTF-8"?>
    <dragons>
      <dragon>
        <name>Smaug</name>
        <proof>Photos</proof>
      </dragon>
    </dragons>

