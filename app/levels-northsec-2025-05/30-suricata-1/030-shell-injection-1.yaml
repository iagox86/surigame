name: 'Shell Injection (Param)'
type: suricata

text: |-
  Now we're pretty much going to go through my solutions for the 8 challenges
  above, and you get to try writing detections!

  Can you detect this command injection?

  Remember that you can write multiple rules if you like, just make sure they
  have unique `sid` values!

  ### Control characters

  **Note: This is a good time to mention that Suricata's parser is super dumb, and there are a lot of characters you can't use**

  Two important ones are:

  * `;` must be escaped as a backslash (`\;`) or converted to a hex string (`|3b|`) - ie, `content: "file\;";` or `content: "file|3b|";`
  * `|` must be encoded as a hex string in `content:` fields (`|7c|`)

  If you need to encode in a PCRE, use `\xXX` style - `pcre:"/\x90/"` (you shouldn't need to do this

  In general, you can encode anything as a hex string - `content: "abc";` is exactly
  equivalent to `content: "|616263|";` and `content: "a|6163|";` and so on. You shouldn't
  have to use too many binary characters in these exercises, but pipes and semicolons
  are special.

base_rule: |-
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; sid:123456; rev:1;)

solution: |-
  alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri; content: "detect-dragon.php"; http.request_body; content: "ip="; pcre: "/[\;|`]/"; sid:123456; rev:1;)

evil_requests:
  - |-
    POST /detect-dragon.php HTTP/1.1
    Host: localhost
    Content-Type: application/x-www-form-urlencoded
    Content-Length: 38

    ip=1.2.3.4;cat /app/dragon-detector-ai

  - |-
    POST /detect-dragon.php HTTP/1.1
    Host: localhost
    Content-Type: application/x-www-form-urlencoded
    Content-Length: 17

    ip=1.2.3.4|whoami

  - |-
    POST /detect-dragon.php HTTP/1.1
    Host: localhost
    Content-Type: application/x-www-form-urlencoded
    Content-Length: 27

    ip=1.2.3.4`cat /etc/passwd`

innocent_requests:
  - |-
    POST /detect-dragon.php HTTP/1.1
    Host: localhost
    Content-Type: application/x-www-form-urlencoded
    Content-Length: 10

    ip=1.2.3.4

  - |-
    GET / HTTP/1.1
    Host: localhost
    Content-Type: application/x-www-form-urlencoded
